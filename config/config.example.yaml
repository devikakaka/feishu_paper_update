# ==============================================================================
# 每日文章自动抓取 + AI 分析 + 飞书知识库发布
# 复制此文件为 config.yaml 并填入你的配置。
# 格式为 ${环境变量名} 的值会从环境变量中读取（密钥不落盘）。
# ==============================================================================

scraper:
  # 多源配置：每个源可以是 HTML 静态页面或 JSON API
  sources:
    # ── 源1：人民网 - 人民时评 ──────────────────────────────────
    - name: "人民网-人民时评"
      type: "html"
      url: "http://opinion.people.com.cn/GB/8213/49160/49219/index.html"
      base_url: "http://opinion.people.com.cn"
      selectors:
        list_items: ".leftItem .item ul li"
        article_link: "a"
        date_selector: "i.gray"
      detail_selectors:
        title: ".rm_txt h1"
        content: "#rm_txt_zw"

    # ── 源2：南方网 - 南方日报评论员 ─────────────────────────────
    - name: "南方网-南方日报评论员"
      type: "api"
      url: "https://search.southcn.com/api/search/all"
      params:
        keyword: "南方日报评论员"
        s: "time"
        page: 1
      api:
        items_path: "data.news.list"
        title_field: "title"
        content_field: "post.content"
        date_field: "pub_time"
        url_field: "url"
        title_filter: "南方日报评论员"

    # ── 源3：人民网 - 壹时评 ────────────────────────────────────
    - name: "人民网-壹时评"
      type: "html"
      url: "http://opinion.people.com.cn/GB/223228/index.html"
      base_url: "http://opinion.people.com.cn"
      selectors:
        list_items: "ul.list_14 li"
        article_link: "a"
        date_selector: "i.gray"
      detail_selectors:
        title: ".rm_txt h1"
        content: "#rm_txt_zw"

  # 请求间隔（秒），礼貌爬虫
  request_delay: 2.0
  # 请求超时（秒）
  request_timeout: 30
  # 自定义 User-Agent
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  # 文章内容最大字符数
  max_content_length: 50000

llm:
  # DashScope API Key（通过环境变量 DASHSCOPE_API_KEY 注入）
  api_key: "${DASHSCOPE_API_KEY}"
  # DashScope OpenAI 兼容端点
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # 模型名称（qwen-plus 性价比最优，qwen-max 质量最佳）
  model: "qwen-plus"

  # 系统提示词：指导模型如何分析文章
  system_prompt: |
    你是一位专业的内容分析师，擅长从评论文章中提取核心观点并生成结构化摘要。

    对于每篇文章，请按以下格式输出分析结果（使用 Markdown）：

    ## [文章标题]

    **来源**: [来源名称]
    **核心主题**: 一句话概括文章的核心观点
    **关键要点**:
    1. 要点一
    2. 要点二
    3. 要点三
    **详细分析**: 2-3 段深入分析，包括论证逻辑、政策背景、现实意义
    **适用场景**: 这篇文章的论述适合在什么情况下参考引用
    **原文链接**: [原文链接](URL)

    ---

    请保持客观、准确、简洁，突出文章的论证逻辑和政策价值。

  # 用户提示词模板（{article_title}、{article_content}、{article_url}、{article_source} 会被替换）
  user_prompt_template: |
    请分析以下评论文章：

    来源：{article_source}
    标题：{article_title}
    链接：{article_url}

    内容：
    {article_content}

  # 每批发送给 LLM 的文章数量
  batch_size: 3
  # LLM 参数
  temperature: 0.3
  max_tokens: 4000
  # 截断文章内容的最大字符数
  max_content_length: 8000

feishu:
  # 飞书 Open API 地址
  # 国内版：https://open.feishu.cn
  # 国际版 (Lark)：https://open.larksuite.com
  base_url: "https://open.feishu.cn"
  # 应用凭证（通过环境变量注入）
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  # 知识库 Space ID（从飞书知识库设置页 URL 获取，详见 docs/FEISHU_SETUP.md）
  wiki_space_id: "7648999909336566964"
  # 可选：父节点 token（为空则创建在根目录）
  parent_node_token: ""
  # 节点标题模板（{date} 会被替换为当天日期）
  node_title_template: "每日评论分析 - {date}"
  # 设为 false 可在本地测试时不上传
  upload_enabled: true

output:
  readme_path: "README.md"
  save_raw_articles: true
  raw_articles_dir: "output/articles"
  save_analysis: true
  analysis_file: "output/latest_analysis.md"
  readme_history_days: 30